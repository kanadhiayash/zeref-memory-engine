schema: zeref.mission/v1
id: audit
version: 1

triggers:
  - audit
  - review compliance
  - inventory
  - drift check

required_seats:
  - id: inventorer
    provides:
      - inventory-collection
      - baseline-diff
    permissions:
      write: false
    reasoning_class: fast

  - id: auditor
    provides:
      - policy-check
      - severity-grading
    permissions:
      write: false
    reasoning_class: deep

  - id: reporter
    provides:
      - report-generation
    permissions:
      write: project
    reasoning_class: balanced
    constraints:
      independent_from:
        - auditor

execution_graph:
  - inventorer
  - auditor
  - reporter

required_outputs:
  - inventory
  - findings
  - audit_report

completion:
  all_steps_pass: true
  unresolved_critical_findings: 0

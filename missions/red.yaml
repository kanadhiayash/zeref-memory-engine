schema: zeref.mission/v1
id: red
version: 1

triggers:
  - red team
  - attack
  - challenge
  - adversarial

required_seats:
  - id: attacker
    provides:
      - threat-model
      - exploit-hypothesis
    permissions:
      write: false
    reasoning_class: deep

  - id: defender
    provides:
      - mitigation-plan
      - detection-signals
    permissions:
      write: false
    reasoning_class: balanced
    constraints:
      independent_from:
        - attacker

  - id: judge
    provides:
      - severity-grading
      - decision-recording
    permissions:
      write: false
    reasoning_class: balanced
    constraints:
      independent_from:
        - attacker
        - defender

execution_graph:
  - attacker
  - defender
  - judge

required_outputs:
  - threat_model
  - mitigation_plan
  - severity_verdict

completion:
  all_steps_pass: true
  unresolved_critical_findings: 0

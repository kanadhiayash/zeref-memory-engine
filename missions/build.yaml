schema: zeref.mission/v1
id: build
version: 1

triggers:
  - build
  - implement
  - refactor
  - create feature

required_seats:
  - id: planner
    provides:
      - architecture-planning
      - dependency-analysis
    permissions:
      write: false
    reasoning_class: deep

  - id: implementer
    provides:
      - code-editing
      - test-execution
    permissions:
      write: project
    reasoning_class: balanced

  - id: verifier
    provides:
      - code-review
      - verification
    permissions:
      write: false
    reasoning_class: balanced
    constraints:
      independent_from:
        - implementer

execution_graph:
  - planner
  - implementer
  - verifier

required_outputs:
  - implementation_plan
  - changed_files
  - verification_report

completion:
  all_steps_pass: true
  unresolved_critical_findings: 0

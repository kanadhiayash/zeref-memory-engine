schema: zeref.mission/v1
id: research
version: 1

triggers:
  - research
  - investigate
  - survey
  - map the space

required_seats:
  - id: scout
    provides:
      - source-discovery
      - source-triage
    permissions:
      write: false
      network: read
    reasoning_class: fast

  - id: analyst
    provides:
      - claim-extraction
      - contradiction-detection
    permissions:
      write: false
    reasoning_class: deep

  - id: reviewer
    provides:
      - evidence-grading
      - reproducibility-check
    permissions:
      write: false
    reasoning_class: balanced
    constraints:
      independent_from:
        - analyst

execution_graph:
  - scout
  - analyst
  - reviewer

required_outputs:
  - source_inventory
  - synthesized_findings
  - evidence_report

completion:
  all_steps_pass: true
  unresolved_critical_findings: 0

schema: zeref.mission/v1
id: ship
version: 1

triggers:
  - ship
  - release
  - deploy
  - promote

required_seats:
  - id: preflight
    provides:
      - release-readiness-checks
      - regression-scan
    permissions:
      write: false
    reasoning_class: fast

  - id: releaser
    provides:
      - changelog-write
      - version-bump
      - tag-cut
    permissions:
      write: project
    reasoning_class: balanced

  - id: gatekeeper
    provides:
      - policy-verification
      - final-signoff
    permissions:
      write: false
    reasoning_class: deep
    constraints:
      independent_from:
        - releaser

execution_graph:
  - preflight
  - releaser
  - gatekeeper

required_outputs:
  - preflight_report
  - release_artifact
  - signoff

completion:
  all_steps_pass: true
  unresolved_critical_findings: 0

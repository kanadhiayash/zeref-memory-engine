version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "type:chore"
      - "area:ci"
      - "evidence:needs-source"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "type:chore"
      - "area:dependencies"
      - "evidence:needs-source"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

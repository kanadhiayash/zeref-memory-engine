name: ZRF Privacy Audit

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scrub:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout — pinned to v7.0.0 release SHA (Node 24)
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python
        # actions/setup-python — pinned to v5.3.0 release SHA
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.12'

      - name: Install package (editable)
        run: |
          python3 -m pip install --upgrade pip
          pip install -e .

      - name: Run strict privacy audit repo-wide (severity-class gate)
        run: |
          # Severity model mirrors _check_privacy_scan in zeref/release/checks.py:
          # credentials-class hits have ZERO tolerance; other classes are informational.
          # Allowlisted files carry `privacy-audit: allow-file "<reason>"` in their first
          # 40 lines; single lines can carry `noqa: privacy-audit`.
          python3 -m zeref audit-privacy --strict --fail-classes credentials

      - name: Scan repo for committed secrets
        run: |
          # any provider-shaped credential pattern anywhere in the repo
          set -e
          if grep -rnE 'sk-proj-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9]{20,}|github_pat_[A-Za-z0-9_]{20,}|xoxb-[A-Za-z0-9-]{10,}|AIza[A-Za-z0-9_\-]{30,}|AKIA[A-Z0-9]{16}' \
              --exclude-dir=.git \
              --exclude-dir=tests \
              --exclude-dir=docs \
              --exclude=privacy.py \
              --exclude=test_*.py \
              .; then
            echo "Committed credential-shaped string detected"
            exit 1
          fi
          echo "No committed credentials detected"

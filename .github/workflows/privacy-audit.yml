name: Privacy audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scrub:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout — pinned to v4.2.2 release SHA
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        # actions/setup-python — pinned to v5.3.0 release SHA
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.12'

      - name: Run strict privacy audit on memory/
        run: |
          python3 -m zeref audit-privacy --strict

      - name: Scan repo for committed secrets
        run: |
          # any provider-shaped credential pattern anywhere in the repo
          set -e
          if grep -rnE 'sk-proj-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9]{20,}|github_pat_[A-Za-z0-9_]{20,}|xoxb-[A-Za-z0-9-]{10,}|AIza[A-Za-z0-9_\-]{30,}|AKIA[A-Z0-9]{16}' \
              --exclude-dir=.git \
              --exclude-dir=tests \
              --exclude-dir=docs \
              --exclude=privacy.py \
              --exclude=test_*.py \
              .; then
            echo "Committed credential-shaped string detected"
            exit 1
          fi
          echo "No committed credentials detected"

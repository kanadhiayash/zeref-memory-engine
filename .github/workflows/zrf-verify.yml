name: ZRF Verify

on:
  push:
    branches: [dev, main]
    tags: ['v*']
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate (Python ${{ matrix.python-version }})
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      # actions/checkout — pinned to v7.0.0 release SHA (Node 24)
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Set up Python
        # actions/setup-python — pinned to v5.3.0 release SHA
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run zeref-validate
        run: |
          python3 scripts/zeref-validate.py

      - name: Verify SemVer tag format (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+(-[a-z0-9.-]+)?$'; then
            echo "Tag '$TAG' does not match SemVer pattern v<major>.<minor>.<patch>"
            exit 1
          fi
          echo "Tag '$TAG' OK"

      - name: Zeref-scope sweep (no non-zeref bleed)
        run: |
          # List changed files vs origin/main; empty file if no diff.
          git diff origin/main..HEAD --name-only > /tmp/zeref-scope.txt || true
          # If no diff, nothing to check.
          if [ ! -s /tmp/zeref-scope.txt ]; then
            echo "Scope OK (no changed files vs origin/main)"
            exit 0
          fi
          # Allowed patterns: any changed file must match one of these anchored patterns.
          # Uses grep -E to avoid awk's regex-delimiter conflicts with `/` inside the pattern.
          allowed='^(AGENTS\.md|CHANGELOG.*|CLAUDE\.md|CODEOWNERS|CONTRIBUTING\.md|GEMINI\.md|GITHUB_OS\.md|INSTALL\.md|LICENSE|MIGRATION\.md|PRIVACY\.md|README\.md|REDACT\.md|SECURITY\.md|SECURITY_CONTACTS\.md|SHARING_POLICY\.md|SKILL\.md|SOUL\.md|QUICKSTART\.md|TASKS\.md|CODEX\.md|LLAMA\.md|dashboard\.html|pyproject\.toml|pytest\.ini|zeref-registry\.json|_shared/.*|agents/.*|assets/.*|benchmarks/.*|commands/.*|config/.*|docs/.*|memory/.*|missions/.*|policies/.*|references/.*|registry/.*|scripts/.*|skills/.*|team-packs/.*|team/.*|tests/.*|zeref/.*|\.claude-plugin/.*|\.cursor/.*|\.github/.*|\.gitignore|\.gitattributes|\.windsurfrules|\.aider\.conf\.yml.*)$'
          # unscoped = lines that DO NOT match the allowed pattern.
          unscoped=$(grep -Ev "$allowed" /tmp/zeref-scope.txt || true)
          if [ -n "$unscoped" ]; then
            echo "Non-zeref files detected:"
            echo "$unscoped"
            exit 1
          fi
          echo "Scope OK"

  version-consistency:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout — pinned to v7.0.0 release SHA (Node 24)
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python
        # actions/setup-python — pinned to v5.3.0 release SHA
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.12'

      - name: Run version consistency checker
        run: |
          python3 scripts/check-version-consistency.py

  test:
    runs-on: ubuntu-latest
    name: pytest (Python ${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      # actions/checkout — pinned to v7.0.0 release SHA (Node 24)
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python
        # actions/setup-python — pinned to v5.3.0 release SHA
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest coverage

      - name: Run pytest with coverage
        # Tests exercise the CLI via subprocess; in-process coverage therefore
        # under-counts cli.py / lock.py paths. The 15% floor is the honest
        # baseline measured today; raising it to 60–85% is tracked in
        # docs/RISK_LOG.md R-007 (in-process CLI test refactor).
        run: |
          coverage run --source=zeref --branch -m pytest -q
          coverage report -m --fail-under=15
          coverage xml -o coverage.xml
          coverage html -d htmlcov

      - name: Upload coverage report
        # actions/upload-artifact — pinned to v4.4.3 release SHA
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: coverage-${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/
          retention-days: 14

  privacy:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout — pinned to v7.0.0 release SHA (Node 24)
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python
        # actions/setup-python — pinned to v5.3.0 release SHA
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.12'

      - name: Install package (editable)
        run: |
          python3 -m pip install --upgrade pip
          pip install -e .

      - name: Run strict privacy audit repo-wide (severity-class gate)
        run: |
          # Severity model mirrors _check_privacy_scan in zeref/release/checks.py:
          # credentials-class hits have ZERO tolerance; other classes are informational.
          # Allowlisted files carry `privacy-audit: allow-file "<reason>"` in their first
          # 40 lines; single lines can carry `noqa: privacy-audit`.
          python3 -m zeref audit-privacy --strict --fail-classes credentials

      - name: Scan repo for committed secrets
        run: |
          # any provider-shaped credential pattern anywhere in the repo
          set -e
          if grep -rnE 'sk-proj-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9]{20,}|github_pat_[A-Za-z0-9_]{20,}|xoxb-[A-Za-z0-9-]{10,}|AIza[A-Za-z0-9_\-]{30,}|AKIA[A-Z0-9]{16}' \
              --exclude-dir=.git \
              --exclude-dir=tests \
              --exclude-dir=docs \
              --exclude=privacy.py \
              --exclude=test_*.py \
              .; then
            echo "Committed credential-shaped string detected"
            exit 1
          fi
          echo "No committed credentials detected"

  benchmarks:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout — pinned to v7.0.0 release SHA (Node 24)
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python
        # actions/setup-python — pinned to v5.3.0 release SHA
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.12'

      - name: Run internal quality-axis benchmarks
        # Axes requiring the lineage intake fixture (ZRF_64_repo_lineage_intake.csv)
        # are local-only inputs and SKIP cleanly on a fresh checkout; skipped axes
        # do not fail the run (see benchmarks/run-all.py docstring / ZRF-AUDIT-012).
        run: |
          python3 benchmarks/run-all.py

  release-check:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout — pinned to v7.0.0 release SHA (Node 24)
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Set up Python
        # actions/setup-python — pinned to v5.3.0 release SHA
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.12'

      - name: Install package (editable)
        run: |
          python3 -m pip install --upgrade pip
          pip install -e .

      - name: Run release readiness gate
        run: |
          python3 -m zeref.cli release check

  e2e:
    runs-on: ubuntu-latest
    name: Clean-clone install + init/doctor
    steps:
      # actions/checkout — pinned to v7.0.0 release SHA (Node 24)
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python
        # actions/setup-python — pinned to v5.3.0 release SHA
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.12'

      - name: Install package into a clean venv
        run: |
          python3 -m venv /tmp/zrf-e2e-venv
          /tmp/zrf-e2e-venv/bin/python3 -m pip install --upgrade pip
          /tmp/zrf-e2e-venv/bin/pip install "${GITHUB_WORKSPACE}"

      - name: zeref init + zeref doctor in a scratch project
        run: |
          set -e
          mkdir -p /tmp/zrf-e2e-project
          cd /tmp/zrf-e2e-project
          /tmp/zrf-e2e-venv/bin/zeref init --name e2e-check --privacy local-only --tier standard
          /tmp/zrf-e2e-venv/bin/zeref doctor

  doc-freshness:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout — pinned to v7.0.0 release SHA (Node 24)
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Set up Python
        # actions/setup-python — pinned to v5.3.0 release SHA
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest

      - name: Run doc freshness guard
        run: |
          python3 -m pytest -q tests/test_doc_freshness.py

name: ZRF Branch Retention

# Enforces the "never delete a protected branch" project policy.
# Feature branches (feat/*, fix/*, audit/*, docs/*, ci/*, chore/*, release/* candidates
# tracked as `release-candidate/*`) may be auto-deleted by GitHub on PR merge —
# that is expected and this workflow does not fire on them. Only protected refs
# (main, dev, release/*) fire the guard.

on:
  delete:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    if: >-
      ${{ github.event.ref_type == 'branch' && (
        github.event.ref == 'main' ||
        github.event.ref == 'dev' ||
        startsWith(github.event.ref, 'release/')
      ) }}
    steps:
      - name: Reject protected-branch deletion
        run: |
          DELETED_REF="${{ github.event.ref }}"
          echo "Protected branch delete detected: ${DELETED_REF}"
          echo "Project policy retains protected branches (main, dev, release/*)."
          echo "Rename to archive/<original-name> instead of deleting."
          exit 1

name: Zeref OS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Zeref OS structure + PATTERNS lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run zeref-validate
        run: |
          python3 scripts/zeref-validate.py

      - name: Verify SemVer tag format (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+(-[a-z0-9.-]+)?$'; then
            echo "Tag '$TAG' does not match SemVer pattern v<major>.<minor>.<patch>"
            exit 1
          fi
          echo "Tag '$TAG' OK"

      - name: Zeref-scope sweep (no non-zeref bleed)
        run: |
          git diff origin/main..HEAD --name-only > /tmp/zeref-scope.txt || true
          allowed='^(AGENTS\.md|CHANGELOG|CHANGELOG-LEGACY|CLAUDE\.md|CODEOWNERS|CONTRIBUTING\.md|GEMINI\.md|GITHUB_OS\.md|INSTALL\.md|LICENSE|MIGRATION\.md|PRIVACY\.md|README\.md|REDACT\.md|SECURITY\.md|SHARING_POLICY\.md|SKILL\.md|SOUL\.md|QUICKSTART\.md|TASKS\.md|dashboard\.html|pyproject\.toml|zeref-registry\.json|_shared/|agents/|assets/|commands/|config/|docs/|memory/|references/|scripts/|skills/|team-packs/|tests/|zeref/|\.claude-plugin/|\.cursor/|\.github/|\.windsurfrules|\.aider\.conf\.yml)'
          if [ -s /tmp/zeref-scope.txt ]; then
            unscoped=$(awk "!/$allowed/" /tmp/zeref-scope.txt)
            if [ -n "$unscoped" ]; then
              echo "Non-zeref files detected:"; echo "$unscoped"; exit 1
            fi
          fi
          echo "Scope OK"

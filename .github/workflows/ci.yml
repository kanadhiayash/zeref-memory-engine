name: ZRF CI

on:
  push:
    branches: [dev, main]
    tags: ['v*']
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate (Python ${{ matrix.python-version }})
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      # actions/checkout — pinned to v7.0.0 release SHA (Node 24)
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Set up Python
        # actions/setup-python — pinned to v5.3.0 release SHA
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run zeref-validate
        run: |
          python3 scripts/zeref-validate.py

      - name: Run version consistency check
        run: |
          python3 scripts/check-version-consistency.py

      - name: Verify SemVer tag format (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+(-[a-z0-9.-]+)?$'; then
            echo "Tag '$TAG' does not match SemVer pattern v<major>.<minor>.<patch>"
            exit 1
          fi
          echo "Tag '$TAG' OK"

      - name: Zeref-scope sweep (no non-zeref bleed)
        run: |
          git diff origin/main..HEAD --name-only > /tmp/zeref-scope.txt || true
          allowed='^(AGENTS\.md|CHANGELOG|CHANGELOG-LEGACY|CLAUDE\.md|CODEOWNERS|CONTRIBUTING\.md|GEMINI\.md|GITHUB_OS\.md|INSTALL\.md|LICENSE|MIGRATION\.md|PRIVACY\.md|README\.md|REDACT\.md|SECURITY\.md|SECURITY_CONTACTS\.md|SHARING_POLICY\.md|SKILL\.md|SOUL\.md|QUICKSTART\.md|TASKS\.md|CODEX\.md|LLAMA\.md|dashboard\.html|pyproject\.toml|pytest\.ini|zeref-registry\.json|_shared/|agents/|assets/|benchmarks/|commands/|config/|docs/|memory/|references/|scripts/|skills/|team-packs/|tests/|zeref/|\.claude-plugin/|\.cursor/|\.github/|\.windsurfrules|\.aider\.conf\.yml)'
          if [ -s /tmp/zeref-scope.txt ]; then
            unscoped=$(awk "!/$allowed/" /tmp/zeref-scope.txt)
            if [ -n "$unscoped" ]; then
              echo "Non-zeref files detected:"; echo "$unscoped"; exit 1
            fi
          fi
          echo "Scope OK"

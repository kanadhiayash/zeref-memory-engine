name: Zeref OS Validation

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Zeref OS structure

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run validator
        run: python3 scripts/zeref-validate.py

      - name: Check skill count (exactly 10)
        run: |
          SKILL_COUNT=$(ls skills/ | wc -l | tr -d ' ')
          echo "Skill count: $SKILL_COUNT"
          if [ "$SKILL_COUNT" -ne "10" ]; then
            echo "ERROR: expected 10 skills, found $SKILL_COUNT"
            exit 1
          fi

      - name: Check agent count (exactly 6)
        run: |
          AGENT_COUNT=$(ls agents/*.md | wc -l | tr -d ' ')
          echo "Agent count: $AGENT_COUNT"
          if [ "$AGENT_COUNT" -ne "6" ]; then
            echo "ERROR: expected 6 agents, found $AGENT_COUNT"
            exit 1
          fi

      - name: Check command count (exactly 8)
        run: |
          CMD_COUNT=$(ls commands/*.md | wc -l | tr -d ' ')
          echo "Command count: $CMD_COUNT"
          if [ "$CMD_COUNT" -ne "8" ]; then
            echo "ERROR: expected 8 commands, found $CMD_COUNT"
            exit 1
          fi

      - name: Check team pack count (exactly 6)
        run: |
          PACK_COUNT=$(ls team-packs/*.md | wc -l | tr -d ' ')
          echo "Team pack count: $PACK_COUNT"
          if [ "$PACK_COUNT" -ne "6" ]; then
            echo "ERROR: expected 6 team packs, found $PACK_COUNT"
            exit 1
          fi

      - name: Check root privacy templates exist
        run: |
          for f in PRIVACY.md REDACT.md SHARING_POLICY.md; do
            if [ ! -f "$f" ]; then
              echo "ERROR: $f missing at root"
              exit 1
            fi
          done

      - name: Check LICENSE exists
        run: |
          if [ ! -f LICENSE ]; then
            echo "ERROR: LICENSE file missing"
            exit 1
          fi

[command]
name = "zeref-ship"
description = "Pre-ship checklist. Runs final executive review on any deliverable before it leaves the workspace. Checks completeness, hallucination risk, positioning alignment, and professional quality."
invoke = "/zeref-ship"

[behavior]
skill_invoked = "zeref-final-executive-reviewer"
auto_classify = true
auto_caveman = false
memory_update = false

[inputs]
required = ["deliverable"]
optional = ["destination", "audience", "quality_bar"]

[outputs]
format = "Executive review report with verdict: PASS / REVISE / BLOCK. Sections: Completeness Check, Hallucination Risk, Positioning Alignment, Professional Quality Score, Specific Revision Notes (if applicable)."
saves_to = "none"

[examples]
example_1 = "/zeref-ship deliverable='Graphify_Deep_Analysis_20260511.docx'"
example_2 = "/zeref-ship deliverable='zeref-skills-fleet README' destination='github' audience='recruiters' quality_bar='portfolio'"

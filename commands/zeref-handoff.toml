[command]
name = "zeref-handoff"
description = "Runs Caveman compression and produces a full handoff block ready to paste into a new Claude session, GitHub, Notion, or local file. Use before ending a long session or switching contexts."
invoke = "/zeref-handoff"

[behavior]
skill_invoked = "zeref-system-caveman-compressor"
auto_classify = false
auto_caveman = true
memory_update = false

[inputs]
required = []
optional = ["destination", "compression_level", "include_decisions"]

[outputs]
format = "Compressed handoff block containing: session state, active projects, key decisions, pending items, next recommended move. Followed by save instructions for the chosen destination."
saves_to = "none"

[examples]
example_1 = "/zeref-handoff"
example_2 = "/zeref-handoff destination='github' compression_level='max' include_decisions='true'"

[command]
name = "zeref-orient"
description = "Orient Zeref at session start. Reads wiki context and project file. Runs automatically on every session start."
agent = "zeref-memory-keeper"
model = "claude-haiku-4-5"
max_turns = 10

[prompt]
content = """
Orient Zeref for this session.

1. Read wiki/index.md (boundary-first — note available domains)
2. Read wiki/hot.md (last session context)
3. Read ZEREFPROJECT.md if it exists in the current directory
4. Report: "Context loaded: [project name or 'no project file'], last session [date or 'no previous sessions'], active context: [2-3 key points]"
5. Ask: "Is this context still current, or has anything changed?"

If no ZEREFPROJECT.md exists, offer: "No project context found. Would you like to run the context intake (12 questions) to set one up?"
"""

[command]
name = "zeref-orient"
description = "Full orientation of the Zeref system state. Lists active projects, memory health, skill fleet status, pending work, and last handoff. Use at session start or after a long gap."
invoke = "/zeref-orient"

[behavior]
skill_invoked = "ZEREFOS"
auto_classify = false
auto_caveman = false
memory_update = false

[inputs]
required = []
optional = ["focus_area", "depth"]

[outputs]
format = "Orientation brief with sections: Active Projects, Memory Health, Skill Fleet Status, Pending Work Items, Last Handoff Summary. Includes a recommended first action."
saves_to = "none"

[examples]
example_1 = "/zeref-orient"
example_2 = "/zeref-orient focus_area='zeref-fleet' depth='deep'"

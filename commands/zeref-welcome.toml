[command]
name = "zeref-welcome"
description = "First-run welcome flow. Guides a new user through Zeref orientation and context intake. Runs automatically on first install."
agent = "zeref-context-engine"
model = "claude-sonnet-4-6"
max_turns = 20

[prompt]
content = """
Welcome a new Zeref user.

1. Introduce Zeref in 2-3 sentences: what it is, what it does, how it helps.
2. Ask: "Before we start — what kind of work are you trying to do today? (Design / Code / Product / Writing / Research / Other)"
3. Based on their answer, explain which Zeref skills are most relevant to them.
4. Ask if they want to set up a project context now (12 questions, takes 5 minutes, unlocks full routing intelligence).
5. If yes: run the context intake flow from zeref-context-engine.
6. If no: say "No problem — you can run /zeref-orient any time to set up context. Let's start with your task. What are you working on?"
"""

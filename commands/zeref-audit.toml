[command]
name = "zeref-audit"
description = "Full system audit. Runs memory lint, skill registry validation, and a final executive review pass on recent outputs. Use periodically or before major milestones."
invoke = "/zeref-audit"

[behavior]
skill_invoked = "zeref-system-memory-lint"
auto_classify = false
auto_caveman = false
memory_update = false

[inputs]
required = []
optional = ["scope", "recent_output_path", "strict_mode"]

[outputs]
format = "Consolidated audit report with three sections: 1) Memory Lint Results (hot.md, log.md, index.md health), 2) Skill Registry Validation Report (pass/warn/fail per skill), 3) Executive Review Summary (recent output quality verdict). Ends with a prioritized action list."
saves_to = "none"

[examples]
example_1 = "/zeref-audit"
example_2 = "/zeref-audit scope='zeref-fleet' recent_output_path='outputs/zeref-brain-v2-report.docx' strict_mode='true'"
